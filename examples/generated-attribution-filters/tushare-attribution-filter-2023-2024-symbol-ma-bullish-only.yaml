run:
  id: tushare-attribution-filter-2023-2024-symbol-ma-bullish-only
  from_date: '2023-01-01'
  to_date: '2024-12-31'
data:
  snapshot_root: data/snapshots
  provider: tushare
  price_adjustment: qfq
  refresh_snapshots: true
  tradable_series:
  - symbol: 000001.SZ
    asset_type: stock
    price_adjustment: qfq
  - symbol: 600036.SH
    asset_type: stock
    price_adjustment: qfq
  - symbol: 600519.SH
    asset_type: stock
    price_adjustment: qfq
  benchmark_series:
    indexes:
    - 000300.SH
  industry_series:
    source: SW2021
    indexes:
    - 801780.SI
    - 801120.SI
strategy:
  template: trend_template_v1
  entry_method: kdj_oversold_entry
  profit_taking_method: kdj_overheated_exit
  stop_loss_method: fixed_percent_stop
  sizing_rule: equal_weight
  sizing_params:
    max_holding_count: 3
    max_position_percent: 0.25
    max_total_exposure_percent: 0.8
    cash_reserve_percent: 0.05
constraints:
  ashare:
    enabled: true
    t_plus_one: true
    limit_up_down: true
    suspension: true
    board_lot_size: 100
broker:
  initial_cash: 1000000
  commission_rate: 0.0003
  stamp_tax_rate: 0.001
  transfer_fee_rate: 1.0e-05
  slippage:
    type: percent
    value: 0.0005
execution:
  engine: backtrader
  stake: 100
output:
  persist: true
  report_root: reports
analysis:
  industry_attribution:
    enabled: true
    source: SW2021
    levels:
    - 1
    - 2
    - 3
  market_regime:
    enabled: true
    timeframes:
    - D
    - W
    - M
  scenario_fit:
    enabled: true
    min_trades: 3
  post_exit:
    window_days:
    - 3
    - 5
    - 10
    - 20
    primary_window_days: 5
    sold_too_early_threshold: 0.0
  entry_attribution:
    enabled: true
    factors:
    - symbol.kdj.j_below_threshold
    - symbol.kdj.j
    - symbol.kdj.threshold
    - symbol.ma.price_above_ma25
    - symbol.ma.price_above_ma60
    - symbol.ma.ma20_above_ma60
    - symbol.ma.bullish_trend
    - symbol.ma.trend_state
    - symbol.ma.ma20
    - symbol.ma.ma25
    - symbol.ma.ma60
    - market.hs300.bullish_trend
    - market.hs300.trend_state
    - market.hs300.close
    - market.hs300.ma20
    - market.hs300.ma60
    - industry.kdj.j_below_threshold
    - industry.kdj.j
    - industry.sw_l1.code
    - sizing.risk_group
    market_symbol: 000300.SH
    market_fast_period: 20
    market_slow_period: 60
    industry_kdj_threshold: 13
    entry_filter:
      enabled: true
      require_checks:
      - symbol.ma.bullish_trend
      missing_policy: block
