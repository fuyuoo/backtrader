suggested_change:
  artifact_or_config: environment_fit.json / environment_fit_comparison.json
  change_zh: 扩大股票池或年份后重跑同一策略，再用 att-compare-environment-fit 比较最佳环境、资金收益率和低样本组合数量。
  not_allowed:
  - 不要直接把环境统计结论转成买卖规则
  - 不要基于低样本组合调参
